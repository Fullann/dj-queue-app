name: Deploy to o2switch via FTPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  pre-deploy:
    name: Contrôles avant déploiement
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Installer les dépendances
        run: npm ci

      - name: Syntaxe Node (tous les .js)
        run: npm run ci:syntax

  deploy:
    needs: pre-deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare clean deploy directory
        run: |
          mkdir -p deploy-dist
          rsync -a --delete \
            --exclude ".git/" \
            --exclude ".github/" \
            --exclude "node_modules/" \
            --exclude ".env" \
            --exclude ".env.*" \
            --exclude ".DS_Store" \
            ./ deploy-dist/

      - name: Deploy via FTP/FTPS
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.SFTP_HOST }}
          username: ${{ secrets.SFTP_USER }}
          password: ${{ secrets.SFTP_PASSWORD }}
          port: ${{ secrets.SFTP_PORT }}
          protocol: ftps
          local-dir: deploy-dist/
          server-dir: ${{ secrets.SFTP_TARGET_DIR }}
          exclude: |
            **/.git/**
            **/.github/**
            **/node_modules/**
            **/.env
            **/.env.*
          dangerous-clean-slate: true
