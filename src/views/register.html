<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DJ Queue - Inscription</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap");
      * {
        font-family: "Inter", sans-serif;
      }
    </style>
  </head>
  <body
    class="bg-[#0d0d0d] text-white min-h-screen flex items-center justify-center p-4"
  >
    <div class="bg-white/5 border border-white/10 rounded-2xl shadow-2xl p-8 max-w-md w-full">
      <div class="text-center mb-8">
        <h1 class="text-4xl font-extrabold text-violet-400 mb-2">🎧 DJ Queue</h1>
        <p class="text-gray-300">Créer un compte DJ</p>
      </div>

      <form id="registerForm" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-300 mb-2"
            >Nom</label
          >
          <input
            type="text"
            id="name"
            required
            class="w-full px-4 py-3 border border-white/20 bg-black/30 text-white rounded-xl focus:ring-2 focus:ring-violet-500 focus:border-transparent outline-none"
            placeholder="DJ Awesome"
          />
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-300 mb-2"
            >Email</label
          >
          <input
            type="email"
            id="email"
            required
            class="w-full px-4 py-3 border border-white/20 bg-black/30 text-white rounded-xl focus:ring-2 focus:ring-violet-500 focus:border-transparent outline-none"
            placeholder="ton@email.com"
          />
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-300 mb-2"
            >Mot de passe</label
          >
          <input
            type="password"
            id="password"
            required
            minlength="6"
            class="w-full px-4 py-3 border border-white/20 bg-black/30 text-white rounded-xl focus:ring-2 focus:ring-violet-500 focus:border-transparent outline-none"
            placeholder="••••••••"
          />
          <p class="text-xs text-gray-400 mt-1">Minimum 6 caractères</p>
        </div>

        <div
          id="errorMessage"
          class="hidden bg-red-500/10 border border-red-400/30 rounded-xl p-3"
        >
          <p class="text-sm text-red-300" id="errorText"></p>
        </div>

        <button
          type="submit"
          class="w-full bg-violet-600 hover:bg-violet-500 text-white font-semibold py-3 px-6 rounded-xl transition"
        >
          Créer mon compte
        </button>
      </form>

      <div class="mt-6 text-center">
        <p class="text-gray-400 text-sm">
          Déjà un compte ?
          <a
            href="/login"
            class="text-violet-400 hover:text-violet-300 font-semibold"
            >Se connecter</a
          >
        </p>
      </div>
    </div>

    <script src="/js/csrf.js"></script>
    <script>
      document
        .getElementById("registerForm")
        .addEventListener("submit", async (e) => {
          e.preventDefault();

          const name = document.getElementById("name").value;
          const email = document.getElementById("email").value;
          const password = document.getElementById("password").value;

          try {
            const response = await fetch("/api/auth/register", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ name, email, password }),
            });

            const data = await response.json();

            if (response.ok) {
              window.location.href = "/dashboard";
            } else {
              document.getElementById("errorText").textContent =
                data.error || "Erreur inscription";
              document
                .getElementById("errorMessage")
                .classList.remove("hidden");
            }
          } catch (error) {
            document.getElementById("errorText").textContent =
              "Erreur inscription";
            document.getElementById("errorMessage").classList.remove("hidden");
          }
        });
    </script>
  </body>
</html>
